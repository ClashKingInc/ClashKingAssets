<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#030304">
  <title>ClashKing Assets</title>
  <link rel="preload" href="./fonts/clashking.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="./viewer.css">
</head>
<body>
  <a class="skip-link" href="#gridShell">Skip to assets</a>
  <div class="app" id="app">
    <aside class="sidebar" aria-label="Asset library navigation">
      <a class="brand" href="./viewer.html" aria-label="ClashKing Assets home">
        <img src="./logos/clashking-wordmark-dark.svg" alt="ClashKing">
        <span>Asset library</span>
      </a>

      <div class="sidebar-heading">
        <span>Categories</span>
      </div>
      <nav class="category-list" id="categoryList" aria-label="Asset categories"></nav>
    </aside>

    <main class="content">
      <header class="topbar">
        <div class="mobile-brand">
          <img src="./logos/clashking-wordmark-dark.svg" alt="ClashKing">
          <span>Assets</span>
        </div>

        <div class="toolbar">
          <label class="search-field" for="searchInput">
            <span class="search-icon" aria-hidden="true"></span>
            <span class="sr-only">Search assets</span>
            <input id="searchInput" type="search" autocomplete="off" placeholder="Search names and paths">
            <kbd>⌘ K</kbd>
          </label>

          <label class="select-field">
            <span class="sr-only">Sort assets</span>
            <select id="sortSelect" aria-label="Sort assets">
              <option value="path-asc">Path A–Z</option>
              <option value="path-desc">Path Z–A</option>
              <option value="name-asc">Name A–Z</option>
              <option value="category-asc">Category A–Z</option>
            </select>
          </label>

          <div class="view-switcher" role="group" aria-label="View options">
            <button id="gridView" type="button" aria-pressed="true" title="Grid view">
              <span class="grid-icon" aria-hidden="true"></span>
              <span class="sr-only">Grid view</span>
            </button>
            <button id="listView" type="button" aria-pressed="false" title="List view">
              <span class="list-icon" aria-hidden="true"></span>
              <span class="sr-only">List view</span>
            </button>
          </div>
        </div>
        <p class="sr-only" id="summary" aria-live="polite">Loading assets…</p>
      </header>

      <nav class="mobile-categories" id="mobileCategories" aria-label="Asset categories"></nav>

      <section class="grid-shell" id="gridShell" aria-label="Asset results" tabindex="-1">
        <div class="spacer" id="spacer"></div>
        <div class="empty" id="empty" hidden>
          <span class="empty-icon" aria-hidden="true"></span>
          <strong id="emptyTitle">No matching assets</strong>
          <span id="emptyBody">Try a different search or category.</span>
          <button id="emptyAction" type="button">Reset filters</button>
        </div>
      </section>
    </main>

    <aside class="details-panel" id="detailsPanel" aria-label="Asset details" aria-hidden="true">
      <div class="details-header">
        <div>
          <span class="eyebrow">Selected asset</span>
          <h2 id="detailName">Asset details</h2>
        </div>
        <button class="icon-button" id="closeDetails" type="button" aria-label="Close asset details" title="Close details">
          <span aria-hidden="true">×</span>
        </button>
      </div>

      <div class="detail-preview">
        <img id="detailImage" alt="">
        <span class="format-badge" id="detailFormat"></span>
      </div>

      <dl class="metadata">
        <div>
          <dt>Category</dt>
          <dd id="detailCategory"></dd>
        </div>
        <div>
          <dt>Dimensions</dt>
          <dd id="detailDimensions">Loading…</dd>
        </div>
        <div class="metadata-wide">
          <dt>Path</dt>
          <dd id="detailPath"></dd>
        </div>
      </dl>

      <div class="primary-actions">
        <a class="button primary" id="downloadAsset" href="" download>Download</a>
        <a class="button" id="openAsset" href="" target="_blank" rel="noopener">Open original</a>
      </div>

      <div class="copy-actions" aria-label="Copy asset values">
        <button id="copyUrl" type="button">
          <span>Copy URL</span>
          <small>CDN address</small>
        </button>
        <button id="copyPath" type="button">
          <span>Copy path</span>
          <small>Relative path</small>
        </button>
      </div>
    </aside>
  </div>

  <div class="details-scrim" id="detailsScrim" hidden></div>
  <div class="toast" id="toast" role="status" aria-live="polite">Copied URL</div>

  <script src="./viewer.js" defer></script>
</body>
</html>
