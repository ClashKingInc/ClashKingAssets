name: Update Assets

on:
  workflow_dispatch:

concurrency:
  group: update-assets
  cancel-in-progress: false

jobs:
  update-assets:
    runs-on: blacksmith-32vcpu-windows-2025
    timeout-minutes: 720
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install WebP tools
        shell: pwsh
        run: |
          choco install webp -y --no-progress
          $webpBin = "C:\Program Files\libwebp\bin"
          if (Test-Path $webpBin) {
            "$webpBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }
          Get-Command img2webp

      - name: Install updater dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install aiohttp boto3 python-dotenv

      - name: Write .env
        shell: pwsh
        run: |
          @"
          FINGERPRINT=${{ secrets.FINGERPRINT }}
          APK_URL=${{ secrets.APK_URL }}
          R2_ENDPOINT_URL=${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCOUNT_ID=${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET=${{ secrets.R2_BUCKET }}
          R2_PREFIX=${{ secrets.R2_PREFIX }}
          SC_RENDER_SCALE=1
          SC_WORKERS=32
          SC_FILE_CONCURRENCY=1
          SC_PROFILE=false
          ASSET_DOWNLOAD_CONCURRENCY=32
          "@ | Set-Content -Path .env

      - name: Run update pipeline
        shell: pwsh
        env:
          PYTHONUTF8: "1"
          PIP_DISABLE_PIP_VERSION_CHECK: "1"
        run: |
          python update_all.py *>&1 | Tee-Object -FilePath update-all.log

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: update-all-log-${{ github.run_id }}
          path: update-all.log
          if-no-files-found: ignore
